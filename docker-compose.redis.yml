# Redis only — use when you run the API on the host (`bun dev` in auth-api).
# Persists data in the named volume `redis-data` (RDB snapshots under /data).
# Loads REDIS_PASSWORD from auth-api/.env (see Makefile: make redis-dev).
# Note: ${REDIS_PASSWORD} in YAML is interpolated by Compose on the *host* from the
# shell or a project .env — not from env_file. Use sh -c so the password comes from
# the container env (injected by env_file).

services:
  redis:
    image: redis:alpine
    env_file:
      - auth-api/.env
    command:
      - sh
      - -c
      - 'exec redis-server --requirepass "$$REDIS_PASSWORD"'
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

volumes:
  redis-data:
