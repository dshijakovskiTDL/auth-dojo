# Full stack (immutable images). For local API hot-reload + Redis, run Redis from
# `docker-compose.redis.yml` and start `bun run dev` in auth-api manually.

services:
  redis:
    image: redis:alpine
    env_file:
      - ./auth-api/.env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - 6379:6379
    volumes:
      - redis-data:/data

  auth-api:
    build:
      context: ./auth-api
      dockerfile: Dockerfile
    ports:
      - 3000:3000
    env_file:
      - ./auth-api/.env
    depends_on:
      - redis

  auth-client:
    build:
      context: ./auth-client
      dockerfile: Dockerfile
    ports:
      - 5173:80
    env_file:
      - ./auth-client/.env
    depends_on:
      - auth-api

volumes:
  redis-data:
