<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body
    style="
      margin: 0;
      padding: 32px 16px;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    "
  >
    <div
      style="
        max-width: 480px;
        margin: 0 auto;
        background: #fff;
        border-radius: 12px;
        overflow: hidden;
      "
    >
      <div style="background: #1a1a1a; padding: 20px 24px">
        <span style="color: #fff; font-size: 18px; font-weight: 600">Auth 🥷 Dojo</span>
      </div>
      <div style="padding: 32px 32px 24px">
        <p style="margin: 0 0 8px; font-size: 15px; color: #111">Hi {{name}},</p>
        <p style="margin: 12px 0 24px; font-size: 15px; color: #555; line-height: 1.6">
          Use the code below to complete your log in process, it expires in
          <strong style="color: #111">10 minutes</strong>.
        </p>
        <div
          style="
            background: #f5f5f5;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-bottom: 24px;
          "
        >
          <p
            style="
              margin: 0 0 8px;
              font-size: 11px;
              text-transform: uppercase;
              letter-spacing: 0.08em;
              color: #888;
            "
          >
            Verification code
          </p>
          <p
            style="
              margin: 0;
              font-size: 36px;
              font-weight: 600;
              letter-spacing: 0.2em;
              color: #111;
              user-select: all;
              font-family: 'Courier New', monospace;
            "
          >
            {{code}}
          </p>
        </div>
        <p
          style="
            margin: 0;
            font-size: 13px;
            color: #888;
            line-height: 1.6;
            border-left: 2px solid #ddd;
            padding-left: 12px;
          "
        >
          If you didn't request this code, you can safely ignore this email.
        </p>
        <p style="margin: 24px 0 0; font-size: 14px; color: #333">
          — The Auth 🥷 Dojo team
        </p>
      </div>
      <div style="border-top: 1px solid #eee; padding: 16px 32px; text-align: center">
        <p style="margin: 0; font-size: 11px; color: #333">
          Auth Dojo Inc · Skopje, North Macedonia
        </p>
      </div>
    </div>
  </body>
</html>
